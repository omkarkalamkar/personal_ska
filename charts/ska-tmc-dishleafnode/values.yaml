display: ":0"
xauthority: "~/.Xauthority"

enabled: true

system: SW-infrastructure
subsystem: ska-tmc-dishleafnode
telescope: SKA-mid
legacy_compatibility: true

labels:
  app: ska-tmc-dishleafnode

global:
  minikube: true
  tango_host: databaseds-tango-base-test:10000
  retry:
  - "--tries=10"
  - "--sleep=5"
  dish_devices:
    - "dishleafnode"
  dishes: ["01", "02"]

dsconfig:
  configuration_file: data/configuration.json
  timeout: 300s
  image:
      registry: artefact.skao.int
      image: ska-tango-images-tango-dsconfig
      tag: 1.5.5
      pullPolicy: IfNotPresent

itango:
  image:
    registry: artefact.skao.int
    image: ska-tango-images-tango-itango
    tag: 9.3.9
    pullPolicy: IfNotPresent

dishleafnode:
  image:
    registry: artefact.skao.int
    image: ska-tmc-dishleafnode
    tag: 0.19.7
    pullPolicy: Never

resources:
  requests:
    cpu: 1000m
    memory: 500Mi

deviceServers:
  mocks:
    enabled: true
    instances: ["01", "02"]
    file: "data/mockdevices.yaml"
  dishln:
    enabled: true
    instances: ["01", "02"]
    MaxTrackTableRetry: 3
    TrackTableRetryDuration: 0.2
    file: "data/dishleafnode.yaml"
    IsDishAbortCommandsEnabled: False
    LivelinessCheckPeriod: 1.0
    EventSubscriptionCheckPeriod: 1.0
    CommandTimeOut: 30.0
    AdapterTimeOut: 2.0
    DishAvailabilityCheckTimeout: 3
  sdpqc:
    enabled: true
    instances: ["01"]
    file: "data/sdpqcmockdevice.yaml"
  dishpointingdevice:
    enabled: true
    instances: ["01", "02"]
    TrackTableUpdateRate: 50
    TrackTableInAdvance: 6
    Elevation: 30.0
    Azimuth: 0.0
    ElevationMaxLimit: 90.0
    ElevationMinLimit: 15.0
    AzimuthMaxLimit: -270.0
    AzimuthMaxLimit: 270.0

    file: "data/dishpointingdevice.yaml"


nodeSelector: {}

affinity: {}

tolerations: []
