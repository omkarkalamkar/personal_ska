name: "dishleafnode-test"
function: telescope-monitoring
domain: general-monitoring
instances: ["01"]
command: "python3 /app/src/ska_tmc_dishleafnode/dish_leaf_node.py"
{{- $IsDishAbortEnabled := .Values.deviceServers.dishln.IsDishAbortEnabled }}
{{- $MaxTrackTableRetry := .Values.deviceServers.dishln.MaxTrackTableRetry }}
{{- $TrackTableRetryDuration := .Values.deviceServers.dishln.TrackTableRetryDuration }}
{{- $LivelinessCheckPeriod := .Values.deviceServers.dishln.LivelinessCheckPeriod }}
{{- $EventSubscriptionCheckPeriod := .Values.deviceServers.dishln.EventSubscriptionCheckPeriod }}
{{- $CommandTimeOutDefault := .Values.deviceServers.dishln.CommandTimeOutDefault }}
{{- $AdapterTimeOut := .Values.deviceServers.dishln.AdapterTimeOut }}
{{- $DishAvailabilityCheckTimeout := .Values.deviceServers.dishln.DishAvailabilityCheckTimeout }}
{{- $domainDish := .Values.global.domain_dish }}
{{- $dishManagerSuffix := .Values.global.dish_manager_suffix }}
{{- $prefixMember := .Values.deviceServers.dishln.prefix_member}}
{{- $dishlnDomain := .Values.global.domain }}
{{- $dishlnFamily := .Values.deviceServers.dishln.family }}
{{- $dishlnPointingFamily := .Values.deviceServers.dishln.pointing_family }}
{{- $WeatherStationDeviceName := .Values.deviceServers.dishln.weather_station_device_name}}

server:
  name: "dish_leaf_node"
  instances:
  {{- range  .Values.deviceServers.dishln.instances }}
    - name: "{{ . }}"
      classes:
      - name: "MidTmcLeafNodeDish"
        devices:
        - name: "{{ $dishlnDomain }}/{{ $dishlnFamily }}/{{ $prefixMember }}{{ printf "%03s" . }}"
          properties:
          - name: "MidDishControl"
            values:
              - "{{ $.Values.global.dish_manager_suffix }}{{ printf "%03s" . }}"
          - name: "DefaultArrayLayoutSourceUris"
            values:
              - "{{ $.Values.deviceServers.dishln.source_uris }}"
          - name: "DefaultArrayLayoutPath"
            values:
              - "{{ $.Values.deviceServers.dishln.array_layout_path }}"
          - name: "MidPointingDevice"
            values:
              - "{{ $dishlnDomain }}/{{ $dishlnPointingFamily }}/{{ $prefixMember }}{{ printf "%03s" . }}"
          - name: "SkaLevel"
            values:
              - "3"
          - name: "LoggingTargetsDefault"
            values:
              - "tango::logger"
          - name: "LoggingLevelDefault"
            values:
              - "5"
          - name: "IsDishAbortEnabled"
            values:
              - "{{ $IsDishAbortEnabled }}"
          - name: "MaxTrackTableRetry"
            values:
              - "{{ $MaxTrackTableRetry }}"
          - name: "TrackTableRetryDuration"
            values:
              - "{{ $TrackTableRetryDuration }}"
          - name: "LivelinessCheckPeriod"
            values:
              - "{{ $LivelinessCheckPeriod }}"
          - name: "EventSubscriptionCheckPeriod"
            values:
              - "{{ $EventSubscriptionCheckPeriod }}"
          - name: "AdapterTimeOut"
            values:
              - "{{ $AdapterTimeOut }}"
          - name: "CommandTimeOutDefault"
            values:
              - "{{ $CommandTimeOutDefault }}"
          - name: "DishAvailabilityCheckTimeout"
            values:
              - "{{ $DishAvailabilityCheckTimeout }}"
          - name: "WeatherStationDeviceName"
            values:
             - "{{ $WeatherStationDeviceName }}"
          - name: "EventSubscriptionCheckPeriod"
            values:
              - "{{ $EventSubscriptionCheckPeriod }}"
  {{- end }}
depends_on:
  - device: sys/database/2
image:
  registry: "{{.Values.dishleafnode.image.registry}}"
  image: "{{.Values.dishleafnode.image.image}}"
  tag: "{{.Values.dishleafnode.image.tag}}"
  pullPolicy: "{{.Values.dishleafnode.image.pullPolicy}}"
