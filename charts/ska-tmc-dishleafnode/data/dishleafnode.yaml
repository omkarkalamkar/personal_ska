name: "dishleafnode-test"
function: telescope-monitoring
domain: general-monitoring
instances: ["01"]
command: "python3 /app/src/ska_tmc_dishleafnode/dish_leaf_node.py"
{{- $TrackTableEntries := .Values.deviceServers.dishln.TrackTableEntries }}
{{- $PointingCalculationPeriod := .Values.deviceServers.dishln.PointingCalculationPeriod }}
server:
  name: "dish_leaf_node"
  instances:
  {{- range  .Values.deviceServers.dishln.instances }}
    - name: "{{ . }}"
      classes:
      - name: "DishLeafNode"
        devices:
        - name: "ska_mid/tm_leaf_node/d{{ printf "%04s" . }}"
          properties:
          - name: "DishMasterFQDN"
            values:
              - "mid-dish/dish-manager/SKA{{ printf "%03s" . }}"
          - name: "SkaLevel"
            values:
              - "3"
          - name: "LoggingTargetsDefault"
            values:
              - "tango::logger"
          - name: "LoggingLevelDefault"
            values:
              - "5"
          - name: "TrackTableEntries"
            values:
              - "{{ $TrackTableEntries }}"
          - name: "PointingCalculationPeriod"
            values:
              - "{{ $PointingCalculationPeriod }}"
  {{- end }}
depends_on:
  - device: sys/database/2
image:
  registry: "{{.Values.dishleafnode.image.registry}}"
  image: "{{.Values.dishleafnode.image.image}}"
  tag: "{{.Values.dishleafnode.image.tag}}"
  pullPolicy: "{{.Values.dishleafnode.image.pullPolicy}}"

