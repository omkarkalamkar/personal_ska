name: "dishleafnode-test"
function: telescope-monitoring
domain: general-monitoring
instances: ["01"]
command: "python3 /app/src/ska_tmc_dishleafnode/dish_leaf_node.py"
{{- $IsDishAbortEnabled := .Values.deviceServers.dishln.IsDishAbortEnabled }}
{{- $MaxTrackTableRetry := .Values.deviceServers.dishln.MaxTrackTableRetry }}
{{- $TrackTableRetryDuration := .Values.deviceServers.dishln.TrackTableRetryDuration }}
{{- $LivelinessCheckPeriod := .Values.deviceServers.dishln.LivelinessCheckPeriod }}
{{- $EventSubscriptionCheckPeriod := .Values.deviceServers.dishln.EventSubscriptionCheckPeriod }}
{{- $CommandTimeOutDefault := .Values.deviceServers.dishln.CommandTimeOutDefault }}
{{- $AdapterTimeOut := .Values.deviceServers.dishln.AdapterTimeOut }}
{{- $DishAvailabilityCheckTimeout := .Values.deviceServers.dishln.DishAvailabilityCheckTimeout }}
{{- $domainDish := .Values.global.domain_dish }}
{{- $dishManagerSuffix := .Values.global.dish_manager_suffix }}
{{- $prefixMember := .Values.deviceServers.dishln.prefix_member}}
{{- $dishlnDomain := .Values.global.domain }}
{{- $dishlnFamily := .Values.deviceServers.dishln.family }}
{{- $dishlnPointingFamily := .Values.deviceServers.dishln.pointing_family }}
{{- $WeatherStationDeviceNames := .Values.deviceServers.dishln.weather_station_device_names}}
{{- $MaxAllowedWindspeed := .Values.deviceServers.dishln.max_allowed_wind_speed }}
{{- $MaxAllowedGustWindspeed := .Values.deviceServers.dishln.max_allowed_gust_wind_speed }}
{{- $MaxAllowedOpsWindspeed := .Values.deviceServers.dishln.max_allowed_ops_wind_speed }}
{{- $MaxAllowedWindspeedDifference := .Values.deviceServers.dishln.max_allowed_wind_speed_difference }}

{{- $WindspeedMeasurementTimeWindow := .Values.deviceServers.dishln.wind_speed_measurement_time_window }}
{{- $GustWindspeedMeasurementTimeWindow := .Values.deviceServers.dishln.gust_wind_speed_measurement_time_window }}
{{- $MeanWindspeedTimeWindow := .Values.deviceServers.dishln.mean_wind_speed_measurement_time_window }}
{{- $MaxAllowedOpsMeanWindspeedMeasurementTimeWindow := .Values.deviceServers.dishln.max_allowed_ops_mean_wind_speed_measurement_time_window }}

{{- $MaxTemperatureThreshold := .Values.deviceServers.dishln.max_temp_threshold }}
{{- $MinTemperatureThreshold := .Values.deviceServers.dishln.min_temp_threshold }}
{{- $TimeDelta := .Values.deviceServers.dishln.time_delta }}
{{- $TemperatureDelta := .Values.deviceServers.dishln.temp_delta }}
{{- $EnableAutoStow := .Values.deviceServers.dishln.enable_auto_stow }}

server:
  name: "dish_leaf_node"
  instances:
  {{- range  .Values.deviceServers.dishln.instances }}
    - name: "{{ . }}"
      classes:
      - name: "MidTmcLeafNodeDish"
        devices:
        - name: "{{ $dishlnDomain }}/{{ $dishlnFamily }}/{{ $prefixMember }}{{ printf "%03s" . }}"
          properties:
          - name: "MidDishControl"
            values:
              - "{{ $.Values.global.dish_manager_suffix }}{{ printf "%03s" . }}"
          - name: "DefaultArrayLayoutSourceUris"
            values:
              - "{{ $.Values.deviceServers.dishln.source_uris }}"
          - name: "DefaultArrayLayoutPath"
            values:
              - "{{ $.Values.deviceServers.dishln.array_layout_path }}"
          - name: "MidPointingDevice"
            values:
              - "{{ $dishlnDomain }}/{{ $dishlnPointingFamily }}/{{ $prefixMember }}{{ printf "%03s" . }}"
          - name: "SkaLevel"
            values:
              - "3"
          - name: "LoggingTargetsDefault"
            values:
              - "tango::logger"
          - name: "LoggingLevelDefault"
            values:
              - "5"
          - name: "IsDishAbortEnabled"
            values:
              - "{{ $IsDishAbortEnabled }}"
          - name: "MaxTrackTableRetry"
            values:
              - "{{ $MaxTrackTableRetry }}"
          - name: "TrackTableRetryDuration"
            values:
              - "{{ $TrackTableRetryDuration }}"
          - name: "LivelinessCheckPeriod"
            values:
              - "{{ $LivelinessCheckPeriod }}"
          - name: "EventSubscriptionCheckPeriod"
            values:
              - "{{ $EventSubscriptionCheckPeriod }}"
          - name: "AdapterTimeOut"
            values:
              - "{{ $AdapterTimeOut }}"
          - name: "CommandTimeOutDefault"
            values:
              - "{{ $CommandTimeOutDefault }}"
          - name: "DishAvailabilityCheckTimeout"
            values:
              - "{{ $DishAvailabilityCheckTimeout }}"
          - name: "WeatherStationDeviceNames"
            values:
            {{- range $wms := $WeatherStationDeviceNames }}
                - "{{ $wms }}"
            {{- end }}
          - name: "EventSubscriptionCheckPeriod"
            values:
              - "{{ $EventSubscriptionCheckPeriod }}"
          - name: "MaxAllowedWindspeed"
            values:
              - "{{$MaxAllowedWindspeed}}"
          - name: "MaxAllowedGustWindspeed"
            values:
              - "{{$MaxAllowedGustWindspeed}}"
          - name: "MaxAllowedOpsWindspeed"
            values:
              - "{{$MaxAllowedOpsWindspeed}}"
          - name: "MaxAllowedWindspeedDifference"
            values:
              - "{{$MaxAllowedWindspeedDifference}}"
          - name: "WindspeedMeasurementTimeWindow"
            values:
              - "{{$WindspeedMeasurementTimeWindow}}"
          - name: "GustWindspeedMeasurementTimeWindow"
            values:
              - "{{$GustWindspeedMeasurementTimeWindow}}"              
          - name: "MeanWindspeedTimeWindow"
            values:
              - "{{$MeanWindspeedTimeWindow}}"
          - name: "MaxAllowedOpsMeanWindspeedMeasurementTimeWindow"
            values:
              - "{{$MaxAllowedOpsMeanWindspeedMeasurementTimeWindow}}"

          - name: "MaxTemperatureThreshold"
            values:
              - "{{$MaxTemperatureThreshold}}"
          - name: "MinTemperatureThreshold"
            values:
              - "{{$MinTemperatureThreshold}}"
          - name: "TimeDelta"
            values:
              - "{{$TimeDelta}}"
          - name: "TemperatureDelta"
            values:
              - "{{$TemperatureDelta}}"
          - name: "EnableAutoStow"
            values:
              - "{{$EnableAutoStow}}"
  {{- end }}
depends_on:
  - device: sys/database/2
image:
  registry: "{{.Values.dishleafnode.image.registry}}"
  image: "{{.Values.dishleafnode.image.image}}"
  tag: "{{.Values.dishleafnode.image.tag}}"
  pullPolicy: "{{.Values.dishleafnode.image.pullPolicy}}"
