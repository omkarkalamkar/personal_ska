name: "dishpointingdevice-test"
function: dish-pointing
domain: pattern-mapping
entrypoints:
  - name: "ska_dishln_pointing_device.dishln_pointing_device.DishPointingDevice"
{{- $TrackTableUpdateRate := .Values.deviceServers.dishpointingdevice.TrackTableUpdateRate }}
{{- $TrackTableInAdvance := .Values.deviceServers.dishpointingdevice.TrackTableInAdvance }}
{{- $Elevation := .Values.deviceServers.dishpointingdevice.Elevation }}
{{- $Azimuth := .Values.deviceServers.dishpointingdevice.Azimuth }}
{{- $ElevationMaxLimit := .Values.deviceServers.dishpointingdevice.ElevationMaxLimit }}
{{- $ElevationMinLimit := .Values.deviceServers.dishpointingdevice.ElevationMinLimit }}
{{- $AzimuthMinLimit := .Values.deviceServers.dishpointingdevice.AzimuthMinLimit }}
{{- $AzimuthMaxLimit := .Values.deviceServers.dishpointingdevice.AzimuthMaxLimit }}

server:
  name: "dishpointing"
  instances:
  {{- range  .Values.deviceServers.dishln.instances }}
    - name: "{{ . }}"
      classes:
      - name: "DishPointingDevice"
        devices:
        - name: "mid-tmc/dish-pointing/d{{ printf "%04s" . }}"
          properties:
            - name: "TrackTableUpdateRate"
              values:
                - "{{ $TrackTableUpdateRate }}"
            - name: "TrackTableInAdvance"
              values:
                - "{{ $TrackTableInAdvance }}"
            - name: "Elevation"
              values:
                - "{{ $Elevation }}"
            - name: "Azimuth"
              values:
                - "{{ $Azimuth }}"
            - name: "ElevationMaxLimit"
              values:
                - "{{ $ElevationMaxLimit }}"
            - name: "ElevationMinLimit"
              values:
                - "{{ $ElevationMinLimit }}"
            - name: "LoggingTargetsDefault"
              values:
                - "tango::logger"
            - name: "LoggingLevelDefault"
              values:
                - "5"
            - name: "SkaLevel"
              values:
                - "4"
            - name: "AzimuthMinLimit"
              values:
                - "{{ $AzimuthMinLimit }}"
            - name: "AzimuthMaxLimit"
              values:
                - "{{ $AzimuthMaxLimit }}"
  {{- end }}

depends_on:
  - device: sys/database/2
image:
  registry: "{{.Values.dishleafnode.image.registry}}"
  image: "{{.Values.dishleafnode.image.image}}"
  tag: "{{.Values.dishleafnode.image.tag}}"
  pullPolicy: "{{.Values.dishleafnode.image.pullPolicy}}"