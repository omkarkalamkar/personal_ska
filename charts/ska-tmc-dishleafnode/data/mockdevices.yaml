name: "mocks-{{.Release.Name}}"
function: testing
domain: mocks
instances: ["01"]
{{- $domainDish := $.Values.global.domain_dish }}
{{- $prefixMember := $.Values.deviceServers.dishln.prefix_member }}
{{- $dishFamily := $.Values.deviceServers.mocks.family }}
entrypoints:
  - name: "ska_tmc_simulators.helper_dish_device.HelperDishDevice"
server:
  name: "mocks"
  instances:
  {{- range  .Values.deviceServers.mocks.instances }}
    - name: "{{ . }}"
      classes:
      - name: "HelperDishDevice"
        devices:
        - name: "{{ $domainDish }}/{{ $dishFamily }}/{{ $prefixMember }}{{ printf "%03s" . }}"
  {{- end }}

depends_on:
  - device: sys/database/2
image:
  registry: "{{.Values.dishleafnode.image.registry}}"
  image: "{{.Values.dishleafnode.image.image}}"
  tag: "{{.Values.dishleafnode.image.tag}}"
  pullPolicy: "{{.Values.dishleafnode.image.pullPolicy}}"
