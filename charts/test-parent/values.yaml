display: ":0"
xauthority: "~/.Xauthority"
legacy_compatibility: true

global:
  minikube: true
  sub-system:
    ska-tango-base:
      enabled: false
  tango_host: databaseds-tango-base-test:10000
  retry:
  - "--tries=10"
  - "--sleep=5"
  DEBUG: 5678

ska-tango-base:
  vnc:
    enabled: false
  tangorest:
    enabled: false
  ingress:
    enabled: false
  tangodb:
    use_pv: false
  itango:
    enabled: true
  jive:
    enabled: false

tmc-dishleafnode:
  deviceServers:
    mocks:
      enabled: true
    dishln:
      enabled: true
      IsDishAbortEnabled: True
      MaxTrackTableRetry: 3
      TrackTableRetryDuration: 0.2
    dishpointingdevice:
      TrackTableUpdateRate: 50
      TrackTableInAdvance: 6
      Elevation: 30.0
      Azimuth: 0.0
      ElevationMaxLimit: 90.0
      ElevationMinLimit: 15.0
      AzimuthMinLimit: -270.0
      AzimuthMaxLimit: 270.0
      SchedularQueuePreEntries: 5

ska-taranta:
  enabled: false