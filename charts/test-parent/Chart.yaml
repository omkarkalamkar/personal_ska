apiVersion: v2
name: test-parent
description: An umbrella Helm chart for ska-tmc-leafnodes deployment.
type: application
version: 0.0.6
appVersion: 0.3.6
icon: https://www.skatelescope.org/wp-content/uploads/2016/07/09545_NEW_LOGO_2014.png
maintainers:
  - name: Team Sahyadri, Team Himalaya
    email: telmgt-internal@googlegroups.com
dependencies:
  - name: ska-tango-base
    version: 0.4.14
    repository: https://artefact.skao.int/repository/helm-internal
  - name: ska-tango-util
    version: 0.4.14
    repository: https://artefact.skao.int/repository/helm-internal
  - name: ska-tmc-dishleafnode
    version: 0.27.2
    repository: file://../ska-tmc-dishleafnode
    alias: tmc-dishleafnode
  - name: ska-taranta
    version: 1.0.29
    repository: https://artefact.skao.int/repository/helm-internal
    condition: ska-taranta.enabled
  - name: ska-tmc-simulators
    version: 1.6.0-dev.c9f6900a8
    repository: https://gitlab.com/api/v4/projects/31132400/packages/helm/dev
    condition: ska-tmc-simulators.enabled
