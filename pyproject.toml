[tool.poetry]
name = "ska-tmc-dishleafnodes"
version = "0.29.0"
description = """The Dish Leaf Node is a TMC component responsible to monitor and control the SKA dish."""
authors = ["Team HIMALAYA", "Team SAHYADRI"]
license = "BSD-3-Clause"

packages = [{ include = "ska_tmc_dishleafnode", from = "src" }]
include = [{ path = 'tests' }]

[tool.poetry.scripts]
DishLeafNodeDS = 'ska_tmc_dishleafnode.dish_leaf_node:main'

[[tool.poetry.source]]
